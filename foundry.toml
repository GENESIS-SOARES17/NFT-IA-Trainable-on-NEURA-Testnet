[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
neura-testnet = "${NEURA_RPC_URL}"

[etherscan]
neura-testnet = { key = "${NEURA_SCAN_KEY}", url = "https://testnet-blockscout.infra.neuraprotocol.io/api" }